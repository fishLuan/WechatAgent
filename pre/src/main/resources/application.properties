spring.application.name=pre
wechat.bot.enabled=true
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/wechat_bot}
spring.data.mongodb.auto-index-creation=true

# Set DASHSCOPE_API_KEY in the operating-system environment before startup.
qwen.api-key=${DASHSCOPE_API_KEY}
qwen.chat-url=https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
qwen.image-url=https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation
qwen.chat-model=qwen-plus
qwen.vl-model=qwen-vl-plus
qwen.image-model=wan2.7-image-pro
qwen.web-search-enabled=true
qwen.generated-image-directory=generated-images
qwen.speech-recognition-model=qwen3-asr-flash
qwen.speech-synthesis-model=qwen-audio-3.0-tts-flash
qwen.speech-voice=longanlingxi
# 龙安洋：20–30 岁成年男声，必须与 CosyVoice v3 模型搭配使用。
qwen.speech-male-voice=longanyang
qwen.speech-male-model=cosyvoice-v3-flash
qwen.speech-tts-url=https://dashscope.aliyuncs.com/api/v1/services/audio/tts/SpeechSynthesizer
# Change this only if the WeChat SDK delivers voice messages in another format.
qwen.speech-audio-mime-type=audio/ogg
qwen.system-prompt=你是一个简洁、可靠的微信 AI 助手。先给结论，只说与问题直接相关的重点；默认使用 1 到 3 句短句或不超过 3 个要点回答。避免寒暄、重复提问、冗长背景、泛泛而谈和展示思考过程。用户明确要求详细说明时，再补充必要细节。

spring.application.name=Spring
server.port=8081

# DeepSeek 文本对话
# 密钥默认从环境变量读取，也可通过 -Ddeepseek.api.key=xxx 覆盖。
deepseek.api.key=${DEEPSEEK_API_KEY:}
deepseek.model=${DEEPSEEK_MODEL:deepseek-chat}
deepseek.url=${DEEPSEEK_URL:https://api.deepseek.com/v1/chat/completions}
deepseek.temperature=0.8
deepseek.max-tokens=1024
deepseek.max-tool-rounds=3
deepseek.connect-timeout-seconds=15
deepseek.request-timeout-seconds=60

# 阿里云百炼（图片理解、文生图、语音合成）
dashscope.api.key=${DASHSCOPE_API_KEY:}
dashscope.multimodal.url=https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation
dashscope.connect-timeout-seconds=30
dashscope.request-timeout-seconds=120
dashscope.vision.model=qwen-vl-plus
dashscope.vision.default-question=请描述这张图片的内容
dashscope.image.model=wan2.6-t2i
dashscope.image.default-size=1024*1024
dashscope.image.default-count=1
dashscope.image.prompt-extend=true
dashscope.image.watermark=false
dashscope.tts.model=qwen3-tts-flash
dashscope.tts.default-voice=Cherry
dashscope.tts.format=mp3
dashscope.tts.max-text-length=500

# 高德开放平台 Web 服务 Key（天气查询）
amap.weather.api.key=${AMAP_WEATHER_API_KEY:}
amap.weather.url=https://restapi.amap.com/v3/weather/weatherInfo
amap.weather.connect-timeout-seconds=10
amap.weather.request-timeout-seconds=15

# 博查AI开放平台 Web 搜索（国内直连，新用户可免费领取调用资源包）
# 注册：https://open.bochaai.com
bocha.api.key=${BOCHA_API_KEY:}
bocha.web-search.url=https://api.bochaai.com/v1/web-search
bocha.connect-timeout-seconds=30
bocha.request-timeout-seconds=60

# Juhe global exchange-rate conversion
juhe.exchange.api.key=${JUHE_EXCHANGE_API_KEY:}
juhe.exchange.url=https://op.juhe.cn/onebox/exchange/currency
juhe.exchange.version=2
juhe.exchange.connect-timeout-seconds=10
juhe.exchange.request-timeout-seconds=15

# Web page extraction tool
webpage.extract.connect-timeout-seconds=10
webpage.extract.request-timeout-seconds=20
webpage.extract.max-body-chars=6000

# 天行数据综合新闻
tianapi.api.key=${TIANAPI_API_KEY:***}

# 微信机器人
wechat.bot.enabled=true
wechat.login.timeout-ms=180000

# DingTalk custom robot notifications
# Keep the webhook and signing secret in environment variables.
notification.dingtalk.enabled=${DINGTALK_ENABLED:true}
notification.dingtalk.webhook=${DINGTALK_WEBHOOK:}
notification.dingtalk.secret=${DINGTALK_SECRET:}
notification.dingtalk.timeout-seconds=10
notification.dingtalk.error-deduplicate-seconds=60

bot.system.prompt=## 可用工具\
当用户的请求涉及以下领域时，必须调用对应的工具获取实时数据，禁止编造：\
- 天气 → get_weather\
- 汇率换算 → convert_currency\
- 生辰八字、五行、十神、流年运势 → calculate_bazi_fortune\
- 新闻、大事、热点、最近发生的事 → get_news\
- 网页内容提取 → extract_web_page\
- 当前时间 → get_current_time\
\
## 角色\
你是一个友好、有耐心的微信机器人助手，名字叫ClawBot。用话痨又自然的中文回答用户，回答不要太长，控制在3句话以内。不要讨论或编造你使用的底层技术、模型架构或API供应商。当用户问你是什么模型时，用幽默的方式回答，比如“我是一个训练有素的语言模型小助手～”。